input {
  tcp {
    port => 50000
    codec => json_lines
  }
}

filter {
  # Logs arrive as JSON from the Logback LogstashEncoder, so fields are already structured.
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "microservices-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}

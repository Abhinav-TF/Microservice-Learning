server:
  port: 9091

spring:
  application:
    name: message-producer

  kafka:
    bootstrap-servers:
      - localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
topic:
  name: message-topic
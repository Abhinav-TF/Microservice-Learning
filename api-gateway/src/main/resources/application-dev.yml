server:
  port: 8083

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
      - id: product-service
        uri: lb://PRODUCT-SERVICE
        predicates:
        - Path=/api/products/**
      - id: order-service
        uri: lb://ORDER-SERVICE
        predicates:
        - Path=/api/orders/**
      - id: payment-service
        uri: lb://PAYMENT-SERVICE
        predicates:
        - Path=/api/payments/**
        filters:
          - name: CircuitBreaker
            args:
              name: paymentServiceCircuitBreaker
              fallbackUri: forward:/fallback/payments
      - id: auth-service
        uri: lb://AUTH-SERVICE
        predicates:
        - Path=/api/auth/**
eureka:
  client:
    service-url:
      defaultZone: http://admin:admin123@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, beans, httptrace, gateway, prometheus
      base-path: /actuator
  
  endpoint:
    health:
      show-details: always
    gateway:
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    propagation:
      type:
      - B3
    zipkin:
      tracing:
        endpoint: http://localhost:9411/api/v2/spans

info:
  app:
    name: API Gateway
    description: Manages API gatway
    version: 1.0.0

springdoc:
  swagger-ui:
    urls:
    - name: Product Service
      url: /api/products/v3/api-docs
    - name: Order Service
      url: /api/orders/v3/api-docs
    - name: Payment Service
      url: /api/payments/v3/api-docs
    - name: Auth Service
      url: /api/auth/v3/api-docs

logging:
  level:
    com.tnf.productservice: DEBUG
    org.springframework.cloud.sleuth: DEBUG
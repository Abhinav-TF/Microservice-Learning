# server:
#   port: 8084

spring:
  application:
    name: payment-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/paymentdb

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin123@localhost:8761/eureka/
#      defaultZone: http://admin:admin123@10.132.125.37:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.tnf.payments: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, beans, httptrace
  endpoint:
    health:
      show-details: always

info:
    app:
        name: Payment Service
        description: Manages payment transactions
        version: 1.0.0
 